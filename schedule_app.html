<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>班表</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d3f55">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="班表">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #eef4fb;
  --surface: #ffffff;
  --border: #b8d0e8;
  --text: #1a2a3a;
  --text-muted: #6a89a8;
  --accent: #2e7abf;
  --accent-light: #ddeeff;
  --accent-blue: #2e7abf;
  --accent-blue-light: #ddeeff;
  --accent-mid: #5a9fd4;
  --header-bg: #1c4f80;
  --header-text: #eef6ff;
  --am-border: #9ac0dc;
  --cell-weekend: #e4eff8;
  --shadow: 0 2px 16px rgba(30,80,140,0.10);
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Serif SC', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOP NAV ── */
.topnav {
  background: var(--header-bg);
  color: var(--header-text);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topnav-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.05em;
}
.topnav-tabs {
  display: flex;
  gap: 4px;
}
.topnav-tab {
  background: none;
  border: none;
  color: rgba(247,244,239,0.55);
  font-family: inherit;
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}
.topnav-tab.active {
  background: rgba(255,255,255,0.22);
  color: var(--header-text);
}

/* ── VIEWS ── */
.view { display: none; flex: 1; padding: 20px; max-width: 900px; margin: 0 auto; width: 100%; }
.view.active { display: block; }

/* ── CALENDAR VIEW ── */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.cal-month-label {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.cal-nav-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  width: 36px; height: 36px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.cal-nav-btn:hover { background: var(--border); }

.cal-grid {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1.5px solid var(--border);
}
.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  background: var(--header-bg);
}
.cal-wd {
  color: var(--header-text);
  text-align: center;
  padding: 10px 0;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  opacity: 0.85;
}
.cal-wd.weekend { opacity: 0.5; }

.cal-days {
  display: grid;
  grid-template-columns: repeat(7,1fr);
}
.cal-day {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  min-height: 80px;
  padding: 6px;
  position: relative;
  cursor: pointer;
  transition: background 0.12s;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.cal-day:hover { background: #d8ecf8; }
.cal-day.empty { background: var(--bg); cursor: default; }
.cal-day.weekend { background: var(--cell-weekend); }
.cal-day.today .cal-day-num {
  background: #2e7abf;
  color: white;
  border-radius: 50%;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.cal-day-num {
  font-size: 13px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.cal-day-slots {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}
.cal-slot {
  font-size: 10px;
  border-radius: 4px;
  padding: 2px 5px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 3px;
}
.cal-slot.am { background: #fce0ea; color: #c05070; }
.cal-slot.pm { background: #cde4f7; color: #2266aa; }
.cal-slot.off { background: #e8f0f8; color: #8aabcc; }
.cal-slot-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.cal-slot-spacer { height: 20px; flex-shrink: 0; }

/* Calendar legend */
.cal-legend {
  display: flex;
  gap: 16px;
  margin-top: 14px;
  font-size: 12px;
  color: var(--text-muted);
  flex-wrap: wrap;
}
.cal-legend-item { display: flex; align-items: center; gap: 5px; }
.cal-legend-dot { width: 8px; height: 8px; border-radius: 2px; }

.generate-btn {
  width: 100%;
  margin-top: 20px;
  background: var(--header-bg);
  color: var(--header-text);
  border: none;
  border-radius: var(--radius);
  padding: 16px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: opacity 0.2s;
}
.generate-btn:hover { opacity: 0.85; }

/* ── SETTINGS VIEW ── */
.settings-section {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.settings-section h3 {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.form-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.form-row label { font-size: 13px; min-width: 80px; }
.form-input {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  flex: 1;
  min-width: 160px;
}
.form-input:focus { border-color: #2e7abf; }

.radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
.radio-label {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 8px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  font-size: 13px;
  transition: all 0.15s;
  background: var(--bg);
}
.radio-label:has(input:checked) {
  border-color: #2e7abf;
  background: #ddeeff;
  color: #1c5f9a;
}
.radio-label input { display: none; }

/* Rule builder */
.rule-builder {
  margin-top: 8px;
}
.rule-day-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 6px;
  margin-bottom: 12px;
}
.rule-day-btn {
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 6px 4px;
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  background: var(--bg);
  transition: all 0.15s;
}
.rule-day-btn.selected-am { border-color: #5aaee0; background: #d0eaf8; color: #1a5a8a; }
.rule-day-btn.selected-pm { border-color: #2e7abf; background: #b8d8f4; color: #1c4f80; }
.rule-day-btn.selected-full { border-color: #1c4f80; background: #9ac8ec; color: #0d2f50; }
.rule-day-btn.selected-half { border-color: #5aaee0; background: #d0eaf8; color: #1a5a8a; }

.rule-slot-picker {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.slot-btn {
  flex: 1;
  min-width: 70px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  background: var(--bg);
  transition: all 0.15s;
  text-align: center;
}
.slot-btn.active-am { border-color: #5aaee0; background: #d0eaf8; color: #1a5a8a; }
.slot-btn.active-pm { border-color: #2e7abf; background: #b8d8f4; color: #1c4f80; }
.slot-btn.active-full { border-color: #1c4f80; background: #9ac8ec; color: #0d2f50; }
.slot-btn.active-half { border-color: #5aaee0; background: #d0eaf8; color: #1a5a8a; }

.settings-note {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.6;
  background: #d8edf8;
  border-radius: 8px;
  padding: 10px 14px;
  margin-top: 4px;
}

.save-btn {
  width: 100%;
  background: var(--header-bg);
  color: var(--header-text);
  border: none;
  border-radius: var(--radius);
  padding: 14px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s;
}
.save-btn:hover { opacity: 0.85; }
.save-feedback {
  text-align: center;
  font-size: 13px;
  color: #2e7abf;
  margin-top: 8px;
  height: 20px;
  transition: opacity 0.3s;
}

/* ── ROSTER VIEW ── */
.roster-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.roster-title {
  font-size: 18px;
  font-weight: 700;
}
.roster-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.export-btn {
  border: 1.5px solid var(--border);
  background: var(--surface);
  border-radius: 8px;
  padding: 8px 16px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 600;
}
.export-btn:hover { background: var(--header-bg); color: var(--header-text); border-color: var(--header-bg); }

/* Submit button */
.submit-btn {
  width: 100%;
  margin-top: 16px;
  background: #1a7a4a;
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 16px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: opacity 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.submit-btn:hover { opacity: 0.85; }
.submit-btn:disabled { background: #8aabcc; cursor: not-allowed; opacity: 0.7; }

/* Roster table */
.roster-wrap {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 2px solid var(--header-bg);
}
.roster-name-bar {
  background: var(--header-bg);
  color: var(--header-text);
  text-align: center;
  padding: 10px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.1em;
}

.roster-week {
  border-bottom: 2px solid var(--header-bg);
}
.roster-week:last-child { border-bottom: none; }

.roster-week-head {
  display: grid;
  grid-template-columns: 56px repeat(7,1fr);
  background: #c8e0f4;
  border-bottom: 1px solid var(--border);
}
.roster-wh-cell {
  border-right: 2px solid #1c4f80;
  padding: 6px 4px;
  text-align: center;
  font-size: 10px;
  font-weight: 700;
}
.roster-wh-cell:last-child { border-right: none; }
.roster-wh-day { font-size: 11px; font-weight: 700; }
.roster-wh-date { font-size: 9px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

.roster-slot-row {
  display: grid;
  grid-template-columns: 56px repeat(7,1fr);
}
.roster-slot-row.am-row {}
.roster-slot-row.pm-row {}

.roster-label-cell {
  border-right: 2px solid #1c4f80;
  background: #c8e0f4;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: #1c4f80;
}
.roster-cell {
  border-right: 2px solid #1c4f80;
  height: 26px;
}
.roster-cell:last-child { border-right: none; }
/* 全天：深蓝 */
.roster-cell.filled-full {
  background-color: #90c4e8;
  background-image: none;
}
/* 半天：浅蓝 */
.roster-cell.filled-half {
  background-color: #d0ecf8;
  background-image: none;
}
/* 兼容旧 pink/blue（保留以防其他地方引用） */
.roster-cell.filled-pink,
.roster-cell.filled-blue {
  background-color: #d0ecf8;
  background-image: none;
}


/* roster legend */
.roster-legend {
  display: flex;
  gap: 16px;
  margin-top: 14px;
  font-size: 12px;
  color: var(--text-muted);
  flex-wrap: wrap;
  align-items: center;
}
.roster-legend-swatch {
  width: 28px; height: 14px;
  border-radius: 3px;
  border: 1px solid rgba(0,0,0,0.1);
}
.roster-legend-item { display: flex; align-items: center; gap: 6px; }
.roster-color-toggle { display: flex; gap: 8px; margin-left: auto; }
.color-btn {
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  background: var(--bg);
  font-weight: 600;
}
.color-btn.active-pink { border-color: #d97090; background: #fde8ee; color: #d97090; }
.color-btn.active-blue { border-color: #2e7abf; background: #ddeeff; color: #2e7abf; }

/* ── CONFIRM MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px 24px;
  width: 320px;
  max-width: 92vw;
  box-shadow: 0 12px 40px rgba(0,0,0,0.25);
}
.modal-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--text);
}
.modal-body {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 22px;
}
.modal-actions {
  display: flex;
  gap: 10px;
}
.modal-btn {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.modal-btn:hover { opacity: 0.85; }
.modal-btn.cancel { background: var(--bg); border: 1.5px solid var(--border); color: var(--text-muted); }
.modal-btn.confirm { background: #1a7a4a; color: #fff; }
.modal-btn.confirm:disabled { background: #8aabcc; cursor: not-allowed; }

/* Submit status banner */
.submit-status {
  margin-top: 12px;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  text-align: center;
  display: none;
}
.submit-status.success { background: #d4edda; color: #1a5c2a; display: block; }
.submit-status.error { background: #fde8e8; color: #922; display: block; }
.submit-status.loading { background: #d8edf8; color: #1a4a6a; display: block; }

@media (max-width: 600px) {
  .topnav { padding: 0 12px; }
  .topnav-tab { padding: 6px 10px; font-size: 12px; }
  .view { padding: 14px; }
  .cal-day { min-height: 56px; padding: 4px; }
  .cal-slot { font-size: 9px; }
  .roster-wh-day { font-size: 9px; }
  .roster-cell { height: 20px; }
  .rule-day-grid { grid-template-columns: repeat(4,1fr); }
}
</style>
<style>
/* ── EMPLOYEE LOGIN ── */
#emp-login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #1c4f80 0%, #2d7abf 100%);
}
.emp-login-box {
  background: #fff; border-radius: 16px; padding: 40px 36px;
  width: 340px; max-width: 94vw; box-shadow: 0 16px 48px rgba(0,0,0,0.22); text-align: center;
}
.emp-login-logo { font-size: 36px; margin-bottom: 8px; }
.emp-login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: #1c4f80; }
.emp-login-sub { font-size: 12px; color: #8aabcc; margin-bottom: 24px; }
.emp-login-input {
  width: 100%; border: 1.5px solid #b8d0e8; border-radius: 8px;
  padding: 12px 14px; font-family: inherit; font-size: 15px; margin-bottom: 12px;
  outline: none; transition: border-color 0.2s; text-align: center;
}
.emp-login-input:focus { border-color: #1c4f80; }
.emp-login-btn {
  width: 100%; background: #1c4f80; color: #fff; border: none; border-radius: 8px;
  padding: 13px; font-family: inherit; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s; margin-bottom: 10px;
}
.emp-login-btn:hover { opacity: 0.88; }
.emp-login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.emp-login-error { color: #c0392b; font-size: 13px; margin-top: 4px; min-height: 18px; }
.emp-changepw-panel {
  display: none; margin-top: 16px; border-top: 1px solid #e0ecf8; padding-top: 16px; text-align: left;
}
.emp-changepw-panel.open { display: block; }
.emp-changepw-title { font-size: 13px; font-weight: 700; color: #1c4f80; margin-bottom: 10px; text-align: center; }
</style>
<script src="config.js"></script>
<script src="i18n.js"></script>
</head>
<body>

<!-- EMPLOYEE LOGIN SCREEN -->
<div id="emp-login-screen">
  <div class="emp-login-box">
    <div class="emp-login-logo">📅</div>
    <div class="emp-login-title" data-i18n="emp_login_title">员工班表</div>
    <div class="emp-login-sub" data-i18n="emp_login_sub">Ume &amp; Comé 排班系统</div>
    <div style="text-align:right;margin-bottom:10px;" id="login-lang-switch"></div>
    <input class="emp-login-input" type="text" id="emp-login-name" data-i18n="emp_login_name_ph" data-i18n-attr="placeholder" placeholder="姓名"
      onkeydown="if(event.key==='Enter')document.getElementById('emp-login-pw').focus()">
    <input class="emp-login-input" type="password" id="emp-login-pw" data-i18n="emp_login_pw_ph" data-i18n-attr="placeholder" placeholder="密码"
      onkeydown="if(event.key==='Enter')doEmpLogin()">
    <button class="emp-login-btn" id="emp-login-btn" data-i18n="emp_login_btn" onclick="doEmpLogin()">登录</button>
    <div class="emp-login-error" id="emp-login-error"></div>

    <!-- 修改密码面板（登录成功后才显示，此处用于登录后弹出） -->
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none;">

<!-- 修改密码 Modal -->
<div class="modal-overlay" id="changepw-modal" style="z-index:9999;">
  <div class="modal-box" style="max-width:360px;">
    <div class="modal-title" data-i18n="cpw_title">🔑 修改密码</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;">
      <input type="password" id="cpw-old" data-i18n="cpw_old_ph" data-i18n-attr="placeholder" placeholder="当前密码" class="form-input" style="margin:0;">
      <input type="password" id="cpw-new" data-i18n="cpw_new_ph" data-i18n-attr="placeholder" placeholder="新密码（至少4位）" class="form-input" style="margin:0;">
      <input type="password" id="cpw-new2" data-i18n="cpw_new2_ph" data-i18n-attr="placeholder" placeholder="再次输入新密码" class="form-input" style="margin:0;">
    </div>
    <div id="cpw-error" style="color:#c0392b;font-size:13px;min-height:16px;margin-bottom:10px;"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" data-i18n="cancel" onclick="closeChangePwModal()">取消</button>
      <button class="modal-btn confirm" data-i18n="cpw_submit" onclick="doEmpChangePw()">确认修改</button>
    </div>
  </div>
</div>

<nav class="topnav">
  <span class="topnav-title" id="nav-title">班表</span>

<script>
// ── 后端适配层 ────────────────────────────────────────────────────
const Backend = {
  _get(params) {
    const base = BACKEND_MODE === 'local' ? LOCAL_API_URL : APPS_SCRIPT_URL;
    return fetch(base + '?' + new URLSearchParams(params).toString()).then(r => r.json());
  },
  _post(body) {
    if (BACKEND_MODE === 'local') {
      return fetch(LOCAL_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(r => r.json());
    } else {
      return fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(body)
      }).then(r => r.json()).catch(() => ({ success: true }));
    }
  },

  // 提交班表（GAS 用 no-cors，不读响应体）
  async postSchedule(payload) {
    if (BACKEND_MODE === 'local') {
      return this._post({ ...payload, action: 'submitSchedule' });
    } else {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      return { success: true };
    }
  },

  // 获取员工账号列表（从服务器读取，支持跨设备）
  async getEmpAccounts() {
    return this._get({ action: 'getEmpAccounts' });
  },

  // 员工修改密码（传哈希值，不传明文）
  async changeEmpPassword(name, oldPasswordHash, newPasswordHash) {
    return this._post({ action: 'changeEmpPassword', name, oldPasswordHash, newPasswordHash });
  },

  // 获取某月的班表提交列表
  async getSubmissions(year, month) {
    return this._get({ action: 'getSubmissions', year, month });
  },
};

// ── STATE ──
let state = {
  calYear: 0, calMonth: 0,
  monthMode: 'next', // 'next' | 'current'
  settings: {
    name: '某某',
    logic: 'include',
    dayRules: [null,null,null,null,null,null,null],
    fullStart: '07:00',
    fullEnd:   '19:00',
    halfStart: '07:00',
    halfEnd:   '13:00'
  },
  overrides: {},       // keyed by "YYYY-MM-DD"（当前模式月份的override）
  overridesNext: {},   // 下月 overrides（切换月份时保留）
  overridesCurrent: {}, // 本月 overrides
  rosterColor: 'blue',
  rosterMonth: null,
  slotMode: 'full',
  prevSubmissionCache: {}, // "year||month" → schedule array from server
};

const DAY_NAMES_ZH = ['一','二','三','四','五','六','日'];
const DAY_NAMES_EN = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// ── PERSISTENCE ──
function loadState() {
  try {
    const s = localStorage.getItem('schedule_app_v2');
    if (s) {
      const parsed = JSON.parse(s);
      const loaded = parsed.settings || {};
      state.settings = Object.assign(state.settings, loaded);
      // 兼容旧版无时间字段
      if (!state.settings.fullStart) state.settings.fullStart = '07:00';
      if (!state.settings.fullEnd)   state.settings.fullEnd   = '19:00';
      if (!state.settings.halfStart) state.settings.halfStart = '07:00';
      if (!state.settings.halfEnd)   state.settings.halfEnd   = '13:00';
      state.overrides = parsed.overrides || {};
      state.overridesNext = parsed.overridesNext || {};
      state.overridesCurrent = parsed.overridesCurrent || {};
      state.rosterColor = parsed.rosterColor || 'blue';
    }
  } catch(e){}
}
function saveState() {
  localStorage.setItem('schedule_app_v2', JSON.stringify({
    settings: state.settings,
    overrides: state.overrides,
    overridesNext: state.overridesNext,
    overridesCurrent: state.overridesCurrent,
    rosterColor: state.rosterColor
  }));
}

// ── VIEWS ──
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.topnav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const tabs = ['calendar','roster'];
  document.querySelectorAll('.topnav-tab')[tabs.indexOf(name)].classList.add('active');
  if (name === 'calendar') { renderCalendar(); renderInlineSettings(); }
}

// ── CALENDAR ──
// 计算"下个月"的年月
function getNextMonth() {
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth() + 1;
  if (m === 12) { y++; m = 1; } else { m++; }
  return { y, m };
}

// 计算"本月"的年月
function getCurrentMonth() {
  const now = new Date();
  return { y: now.getFullYear(), m: now.getMonth() + 1 };
}

// 根据今天是否月底（剩余不足7天）决定默认显示本月还是下月
function getDefaultMonthMode() {
  const now = new Date();
  const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  return (lastDay - now.getDate()) < 7 ? 'next' : 'current';
}

// 今天的 dateKey
function getTodayKey() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

// 切换月份模式（本月/下月），并持久化各自的 overrides
function switchMonthMode(mode) {
  if (state.monthMode === mode) return;
  // 保存当前 overrides 到对应存储
  if (state.monthMode === 'next') {
    state.overridesNext = { ...state.overrides };
  } else {
    state.overridesCurrent = { ...state.overrides };
  }
  state.monthMode = mode;
  // 恢复目标月份的 overrides
  if (mode === 'next') {
    state.overrides = { ...state.overridesNext };
    const { y, m } = getNextMonth();
    state.calYear = y; state.calMonth = m;
  } else {
    state.overrides = { ...state.overridesCurrent };
    const { y, m } = getCurrentMonth();
    state.calYear = y; state.calMonth = m;
    // 尝试加载本月之前提交的数据
    loadPrevSubmission(y, m);
  }
  saveState();
  updateMonthModeTabs();
  renderCalendar();
  renderInlineSettings();
}

function updateMonthModeTabs() {
  const btnCurrent = document.getElementById('btn-mode-current');
  const btnNext    = document.getElementById('btn-mode-next');
  if (!btnCurrent || !btnNext) return;
  if (state.monthMode === 'current') {
    btnCurrent.style.background = 'var(--accent)';
    btnCurrent.style.color = '#fff';
    btnCurrent.style.borderColor = 'var(--accent)';
    btnNext.style.background = '';
    btnNext.style.color = '';
    btnNext.style.borderColor = '';
  } else {
    btnNext.style.background = 'var(--accent)';
    btnNext.style.color = '#fff';
    btnNext.style.borderColor = 'var(--accent)';
    btnCurrent.style.background = '';
    btnCurrent.style.color = '';
    btnCurrent.style.borderColor = '';
  }
}

// 加载服务器上该员工某月的历史提交（用于本月重提时的对比和过去日期复制）
async function loadPrevSubmission(year, month) {
  const cacheKey = `${year}||${month}`;
  if (state.prevSubmissionCache[cacheKey]) return; // 已缓存
  try {
    const result = await Backend.getSubmissions(year, month);
    if (result && result.submissions) {
      const name = state.settings.name;
      const mySub = result.submissions.find(s => s.name === name);
      if (mySub && mySub.schedule) {
        state.prevSubmissionCache[cacheKey] = mySub.schedule;
      } else {
        state.prevSubmissionCache[cacheKey] = null; // 无历史提交
      }
      renderCalendar(); // 刷新（可能影响已过去日期的显示）
    }
  } catch(e) {
    state.prevSubmissionCache[cacheKey] = null;
  }
}

function initCalendar() {
  if (state.monthMode === 'current') {
    const { y, m } = getCurrentMonth();
    state.calYear = y;
    state.calMonth = m;
  } else {
    const { y, m } = getNextMonth();
    state.calYear = y;
    state.calMonth = m;
  }
}

function changeMonth(delta) {
  // 员工只可提交本月或下月，不允许任意切换
}

// 将时间字符串"HH:MM"转为分钟数（00:00 视为 24:00 = 1440）
function timeToMinutes(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  if (h === 0 && (m || 0) === 0) return 1440;
  return h * 60 + (m || 0);
}
// 00:00 显示为 24:00
function fmtTime(t) {
  if (!t) return t;
  return t === '00:00' ? '24:00' : t;
}
// 解析文本时间输入（支持 24:00），返回内部存储格式 HH:MM（24:00 → 00:00）
function normalizeTimeInput(raw) {
  if (!raw) return '';
  const s = raw.trim().replace('：', ':');
  const m = s.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return '';
  let h = parseInt(m[1]), min = parseInt(m[2]);
  if (min > 59) return '';
  if (h === 24 && min === 0) return '00:00';
  if (h > 23) return '';
  return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}
// 根据 slot 的时长判断显示类别：'full' | 'half'
function slotDisplayType(slot) {
  if (!slot || slot.type === 'off') return 'off';
  if (slot.type === 'full') return 'full';
  if (slot.type === 'half') return 'half';
  if (slot.type === 'custom') {
    const dur = timeToMinutes(slot.end) - timeToMinutes(slot.start);
    const fullDur = timeToMinutes(state.settings.fullEnd) - timeToMinutes(state.settings.fullStart);
    return (dur >= fullDur) ? 'full' : 'half';
  }
  return 'off';
}

function getSlotForDate(year, month, day) {
  const key = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  // 自定义 override 可能是对象 {type,start,end}
  const ov = state.overrides[key];
  if (ov !== undefined) {
    if (typeof ov === 'object' && ov !== null) return ov; // custom object
    if (ov === 'off')  return { type: 'off',  start: '', end: '' };
    if (ov === 'full') return { type: 'full', start: state.settings.fullStart, end: state.settings.fullEnd };
    if (ov === 'half') return { type: 'half', start: state.settings.halfStart, end: state.settings.halfEnd };
  }
  const d = new Date(year, month-1, day);
  const wd = (d.getDay() + 6) % 7;
  const rule = state.settings.dayRules[wd];
  let rawType;
  if (state.settings.logic === 'include') {
    rawType = rule || 'off';
  } else {
    // exclude 模式：标记了 full/half 的星期为休息，其余为全天
    if (!rule) rawType = 'full';
    else if (rule === 'full') rawType = 'off';
    else if (rule === 'half') rawType = 'half'; // 半天排除模式：标记=半天工作
    else rawType = 'off';
  }
  if (rawType === 'off')  return { type: 'off',  start: '', end: '' };
  if (rawType === 'full') return { type: 'full', start: state.settings.fullStart, end: state.settings.fullEnd };
  if (rawType === 'half') return { type: 'half', start: state.settings.halfStart, end: state.settings.halfEnd };
  // 兼容旧数据 am/pm
  if (rawType === 'am') return { type: 'half', start: '07:00', end: '13:00' };
  if (rawType === 'pm') return { type: 'half', start: '13:00', end: '19:00' };
  return { type: 'off', start: '', end: '' };
}

function renderWeekdayHeader() {

function renderCalendar() {
  renderWeekdayHeader();
  const y = state.calYear, m = state.calMonth;
  const monthNames = t('cal_months');
  const yearLabel = getLang() === 'en'
    ? `${monthNames[m-1]} ${y}`
    : `${y}年 ${monthNames[m-1]}`;
  document.getElementById('cal-month-label').textContent = yearLabel;
  document.getElementById('nav-title').textContent = getLang() === 'en'
    ? `${state.settings.name}'s Schedule`
    : state.settings.name + '的班表';

  const firstDay = new Date(y, m-1, 1);
  const daysInMonth = new Date(y, m, 0).getDate();
  const startWd = (firstDay.getDay() + 6) % 7;

  const todayKey = getTodayKey();
  const isCurrent = state.monthMode === 'current';
  const cacheKey = `${y}||${m}`;
  const prevSchedule = state.prevSubmissionCache[cacheKey] || null;

  // 更新提示语
  const hintEl = document.getElementById('cal-mode-hint');
  if (hintEl) {
    if (isCurrent) {
      hintEl.textContent = prevSchedule
        ? t('cal_hint_current_with_prev')
        : t('cal_hint_current_no_prev');
    } else {
      hintEl.textContent = t('cal_hint_next');
    }
  }

  let html = '';
  for (let i = 0; i < startWd; i++) {
    html += `<div class="cal-day empty"></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const wd = (startWd + d - 1) % 7;
    const isWeekend = wd >= 5;
    const isToday = key === todayKey;
    const isPast = isCurrent && key < todayKey; // 本月已过去的日期
    const hasOverride = state.overrides[key] !== undefined;

    let slot;
    if (isPast && prevSchedule) {
      // 过去日期：从历史提交数据中读取（只读展示）
      const prevEntry = prevSchedule.find(e => e.date === key);
      if (prevEntry) {
        slot = { type: prevEntry.slot || 'off', start: prevEntry.start || '', end: prevEntry.end || '' };
      } else {
        slot = { type: 'off', start: '', end: '' };
      }
    } else if (isPast) {
      // 过去日期但无历史提交：显示休息
      slot = { type: 'off', start: '', end: '' };
    } else {
      slot = getSlotForDate(y, m, d);
    }

    let slotHTML = '';
    if (slot.type === 'full') {
      slotHTML += `<div class="cal-slot pm"><span class="cal-slot-dot"></span>${fmtTime(slot.start)}–${fmtTime(slot.end)}</div>`;
    } else if (slot.type === 'half') {
      slotHTML += `<div class="cal-slot am"><span class="cal-slot-dot"></span>${fmtTime(slot.start)}–${fmtTime(slot.end)}</div>`;
    } else if (slot.type === 'custom') {
      slotHTML += `<div class="cal-slot" style="background:#f0e6ff;color:#6c3483;border-radius:3px;font-size:9px;padding:2px 3px;"><span class="cal-slot-dot" style="background:#9b59b6;"></span>${fmtTime(slot.start)}–${fmtTime(slot.end)}</div>`;
    } else {
      slotHTML += `<div class="cal-slot off">${t('cal_day_off')}</div>`;
    }

    if (isPast) {
      // 已过去：锁定，不可点击，显示半透明
      html += `<div class="cal-day ${isWeekend?'weekend':''}" style="opacity:0.45;cursor:default;pointer-events:none;">
        <div class="cal-day-num">${d}</div>
        <div class="cal-day-slots">${slotHTML}</div>
      </div>`;
    } else {
      html += `<div class="cal-day ${isWeekend?'weekend':''} ${isToday?'today':''}" onclick="openOverride('${key}',${d})">
        <div class="cal-day-num">${d}${hasOverride ? '<span style="position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--accent);"></span>' : ''}</div>
        <div class="cal-day-slots">${slotHTML}</div>
      </div>`;
    }
  }
  document.getElementById('cal-days').innerHTML = html;
}

function getRosterSlotForDate(y, m, d) {

  const todayKey = getTodayKey();
  const dateKey = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  if (isCurrent && dateKey < todayKey) {
    const cacheKey = `${y}||${m}`;
    const prevSchedule = state.prevSubmissionCache[cacheKey] || null;
    if (prevSchedule) {
      const prevEntry = prevSchedule.find(e => e.date === dateKey);
      if (prevEntry) return { type: prevEntry.slot || 'off', start: prevEntry.start || '', end: prevEntry.end || '' };
    }
    return { type: 'off', start: '', end: '' };
  }
  return getSlotForDate(y, m, d);
}

// ── SUBMIT FLOW ──
function buildSchedulePayload() {
  if (!state.rosterMonth) return null;
  const { year: y, month: m, mode } = state.rosterMonth;
  const daysInMonth = new Date(y, m, 0).getDate();
  const todayKey = getTodayKey();
  const isCurrent = mode === 'current';
  const cacheKey = `${y}||${m}`;
  const prevSchedule = isCurrent ? (state.prevSubmissionCache[cacheKey] || null) : null;

  const days = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isPast = isCurrent && dateKey < todayKey;
    let slotObj;
    if (isPast && prevSchedule) {
      // 过去日期：沿用历史提交
      const prevEntry = prevSchedule.find(e => e.date === dateKey);
      slotObj = prevEntry
        ? { type: prevEntry.slot || 'off', start: prevEntry.start || '', end: prevEntry.end || '' }
        : { type: 'off', start: '', end: '' };
    } else if (isPast) {
      slotObj = { type: 'off', start: '', end: '' };
    } else {
      slotObj = getSlotForDate(y, m, d);
    }
    days.push({ date: dateKey, slot: slotObj.type, start: slotObj.start, end: slotObj.end });
  }

  // 备注（所有提交均读取，选填）
  const noteEl = document.getElementById('emp-note-input');
  const note = noteEl ? noteEl.value.trim() : '';

  return {
    name: state.settings.name,
    year: y,
    month: m,
    submittedAt: new Date().toISOString(),
    schedule: days,
    ...(note ? { note } : {})
  };
}

function openSubmitConfirm() {
  if (!state.rosterMonth) {

  }
  if (!state.settings.name || state.settings.name === '某某') {
    alert(t('submit_no_login'));
    return;
  }
  const { year: y, month: m, mode } = state.rosterMonth;
  const monthNames = t('cal_months');

  const bodyText = getLang() === 'en'

    : `确认将 ${state.settings.name} 的 ${y}年${monthNames[m-1]} 可工作时段提交给管理员吗？提交后管理员将根据此信息安排上班时间。${isCurrent ? '（本月：今天之前日期将沿用历史记录，今天及之后日期以当前填写为准）' : ''}`;

function closeSubmitModal() {
  document.getElementById('submit-modal').classList.remove('open');
}

async function doSubmit() {
  const payload = buildSchedulePayload();
  if (!payload) return;

  const btn = document.getElementById('confirm-submit-btn');
  btn.disabled = true;
  btn.textContent = t('submit_submitting');

  const statusEl = document.getElementById('submit-status');

  // Check if backend is configured
  if (BACKEND_MODE === 'gas' && (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('YOUR_APPS_SCRIPT'))) {
    closeSubmitModal();
    statusEl.className = 'submit-status error';
    statusEl.textContent = t('submit_no_backend');
    btn.disabled = false;
    btn.textContent = t('submit_confirm_btn');
    return;
  }

  try {
    statusEl.className = 'submit-status loading';
    statusEl.textContent = t('submit_waiting');

    const result = await Backend.postSchedule(payload);

    closeSubmitModal();
    if (result && result.success === false) {
      statusEl.className = 'submit-status error';
      statusEl.textContent = t('submit_fail', { error: result.error || t('unknown_error') });
      btn.disabled = false;
      btn.textContent = t('submit_confirm_btn');
      return;
    }
    statusEl.className = 'submit-status success';
    statusEl.textContent = t('submit_success');
    document.getElementById('submit-btn').disabled = true;

    // 提交成功后更新本地 prevSubmissionCache（本月提交后，此次 schedule 成为新的历史记录）
    const cacheKey = `${payload.year}||${payload.month}`;
    state.prevSubmissionCache[cacheKey] = payload.schedule;
    // 清空备注框
    const noteEl = document.getElementById('emp-note-input');
    if (noteEl) noteEl.value = '';

    // Save submission record locally
    localStorage.setItem('last_submit_' + payload.year + '_' + payload.month, JSON.stringify({
      name: payload.name,
      submittedAt: payload.submittedAt
    }));

  } catch(err) {
    closeSubmitModal();
    statusEl.className = 'submit-status error';
    statusEl.textContent = t('submit_network_fail');
    btn.disabled = false;
    btn.textContent = t('submit_confirm_btn');
  }
}

// ── EXPORT (SVG-based) ──
function buildRosterSVG() {
  if (!state.rosterMonth) return null;
  const { year: y, month: m } = state.rosterMonth;
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const DAY_EN = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const MON_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const firstDay = new Date(y, m-1, 1);
  const daysInMonth = new Date(y, m, 0).getDate();
  const startWd = (firstDay.getDay() + 6) % 7;

  const weeks = [];
  let week = new Array(7).fill(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const wd = (startWd + d - 1) % 7;
    week[wd] = d;
    if (wd === 6 || d === daysInMonth) { weeks.push([...week]); week = new Array(7).fill(null); }
  }

  const W = 900, LABEL_W = 52, COL_W = (W - LABEL_W) / 7;
  const HEAD_H = 38, ROW_H = 28;
  const WEEK_H = HEAD_H + ROW_H;
  const TITLE_H = 36, PADDING = 2;
  const H = TITLE_H + weeks.length * (WEEK_H + 3) + PADDING;

  const headerBg = '#2d3f55', headerText = '#f0f4fa';
  const headBg = '#c8d8e8', borderColor = '#1c2e40';
  const fillFull = '#90c4e8';   // 全天：深蓝
  const fillHalf = '#d0ecf8';   // 半天：浅蓝

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" font-family="Arial,sans-serif">`;

  svg += `<rect width="${W}" height="${H}" fill="#f0f2f6"/>`;
  svg += `<rect x="0" y="0" width="${W}" height="${TITLE_H}" fill="${headerBg}"/>`;
  svg += `<text x="${W/2}" y="${TITLE_H*0.68}" text-anchor="middle" fill="${headerText}" font-size="14" font-weight="bold">${state.settings.name} · ${y}年${monthNames[m-1]} · 可工作时段</text>`;

  const tableY = TITLE_H;
  svg += `<rect x="0" y="${tableY}" width="${W}" height="${H - TITLE_H}" fill="none" stroke="${borderColor}" stroke-width="2"/>`;

  weeks.forEach((week, wi) => {
    const wy = tableY + wi * (WEEK_H + 3);

    // ── 表头行 ──
    svg += `<rect x="0" y="${wy}" width="${W}" height="${HEAD_H}" fill="${headBg}"/>`;
    // 对角线
    svg += `<line x1="0" y1="${wy}" x2="${LABEL_W}" y2="${wy+HEAD_H}" stroke="#8090b0" stroke-width="1"/>`;
    svg += `<text x="${LABEL_W-4}" y="${wy+11}" text-anchor="end" fill="#6070a0" font-size="8">日期</text>`;
    svg += `<text x="4" y="${wy+HEAD_H-5}" fill="#6070a0" font-size="8">姓名</text>`;
    week.forEach((d, i) => {
      const cx = LABEL_W + i * COL_W;
      const dateStr = d ? `${d}-${MON_EN[m-1]}-${String(y).slice(2)}` : '';
      svg += `<text x="${cx + COL_W/2}" y="${wy+16}" text-anchor="middle" fill="${borderColor}" font-size="11" font-weight="bold">${DAY_EN[i]}</text>`;
      svg += `<text x="${cx + COL_W/2}" y="${wy+29}" text-anchor="middle" fill="#6070a0" font-size="9">${dateStr}</text>`;
      if (i > 0) svg += `<line x1="${cx}" y1="${wy}" x2="${cx}" y2="${wy+HEAD_H}" stroke="${borderColor}" stroke-width="1.5"/>`;
    });
    // 分隔线（表头底部）
    svg += `<line x1="0" y1="${wy+HEAD_H}" x2="${W}" y2="${wy+HEAD_H}" stroke="${borderColor}" stroke-width="1.5"/>`;
    // 左侧标签列竖线
    svg += `<line x1="${LABEL_W}" y1="${wy}" x2="${LABEL_W}" y2="${wy+WEEK_H}" stroke="${borderColor}" stroke-width="2"/>`;

    // ── 时段行（单行）──
    const rowY = wy + HEAD_H;
    svg += `<rect x="0" y="${rowY}" width="${LABEL_W}" height="${ROW_H}" fill="${headBg}"/>`;
    svg += `<text x="${LABEL_W/2}" y="${rowY + ROW_H*0.62}" text-anchor="middle" fill="#2d3f55" font-size="9" font-weight="bold">时段</text>`;

    week.forEach((d, i) => {
      const cx = LABEL_W + i * COL_W;
      const slot = d ? getRosterSlotForDate(y, m, d) : null;
      const isOff = !slot || slot.type === 'off';
      if (slot && !isOff) {
        const dispType = slotDisplayType(slot);
        const bg = dispType === 'full' ? fillFull : fillHalf;
        svg += `<rect x="${cx+1}" y="${rowY+1}" width="${COL_W-2}" height="${ROW_H-2}" fill="${bg}"/>`;
        // 时间文字
        const textColor = '#1a3a5a';
        svg += `<text x="${cx + COL_W/2}" y="${rowY + ROW_H*0.42}" text-anchor="middle" fill="${textColor}" font-size="9" font-weight="bold">${slot.start}</text>`;
        svg += `<text x="${cx + COL_W/2}" y="${rowY + ROW_H*0.78}" text-anchor="middle" fill="${textColor}" font-size="9">${slot.end}</text>`;
      } else if (isOff && d) {
        // 禁止图标（圆圈+斜线）
        const cx2 = cx + COL_W / 2;
        const cy2 = rowY + ROW_H / 2;
        const r = 7;
        svg += `<circle cx="${cx2}" cy="${cy2}" r="${r}" fill="none" stroke="#b0b8c8" stroke-width="1.8"/>`;
        svg += `<line x1="${cx2 - r*0.7}" y1="${cy2 - r*0.7}" x2="${cx2 + r*0.7}" y2="${cy2 + r*0.7}" stroke="#b0b8c8" stroke-width="1.8"/>`;
      }
      if (i > 0) svg += `<line x1="${cx}" y1="${rowY}" x2="${cx}" y2="${rowY+ROW_H}" stroke="${borderColor}" stroke-width="1.5"/>`;
    });

    // 周底部分隔线
    svg += `<line x1="0" y1="${rowY+ROW_H}" x2="${W}" y2="${rowY+ROW_H}" stroke="${borderColor}" stroke-width="2"/>`;
  });

  svg += `</svg>`;
  return { svg, W, H };
}

function svgToDataURL(svg) {
  const encoded = btoa(unescape(encodeURIComponent(svg)));
  return 'data:image/svg+xml;base64,' + encoded;
}

function renderSVGToCanvas(svg, W, H, scale) {
  return new Promise((resolve, reject) => {
    const canvas = document.createElement('canvas');
    canvas.width = W * scale;
    canvas.height = H * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#f0f2f6';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, W * scale, H * scale);
      resolve(canvas);
    };
    img.onerror = reject;
    img.src = svgToDataURL(svg);
  });
}

function exportPNG() {
  const result = buildRosterSVG();
  if (!result) return;
  const { svg, W, H } = result;
  const fname = `班表_${state.settings.name}_${state.rosterMonth.year}${String(state.rosterMonth.month).padStart(2,'0')}.png`;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

  if (isIOS) {
    const win = window.open('', '_blank');
    if (!win) { alert(t('export_safari_alert')); return; }
    win.document.write('<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><style>body{margin:0;background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}img{max-width:100%;}p{color:#ccc;font-size:13px;font-family:sans-serif;padding:14px;text-align:center;}</style></head><body><p>生成中…</p></body></html>');
    win.document.close();
    renderSVGToCanvas(svg, W, H, 2).then(canvas => {
      const dataURL = canvas.toDataURL('image/png');
      win.document.body.innerHTML = `<img src="${dataURL}"><p>${t('export_long_press')}</p>`;
    }).catch(() => { win.close(); alert(t('export_fail')); });
  } else {
    renderSVGToCanvas(svg, W, H, 2).then(canvas => {
      const a = document.createElement('a');
      a.download = fname;
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  }
}

function exportPDF() {
  const result = buildRosterSVG();
  if (!result) return;
  const { svg, W, H } = result;

  const win = window.open('', '_blank');
  if (!win) { alert(t('export_safari_alert')); return; }
  win.document.write('<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><style>body{margin:0;background:#fff;}p{font-family:sans-serif;font-size:13px;color:#666;text-align:center;padding:12px;background:#f5f5f5;}</style></head><body><p>生成中…</p></body></html>');
  win.document.close();

  renderSVGToCanvas(svg, W, H, 2).then(canvas => {
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    win.document.body.innerHTML = `
      <div style="font-family:sans-serif;font-size:13px;color:#666;text-align:center;padding:12px;background:#f5f5f5;">
        点右上角 <b>分享</b> → <b>打印</b> → 左下角预览图向上划 → 分享 → <b>存储为PDF</b>
      </div>
      <img src="${imgData}" style="width:100%;display:block;">`;
  }).catch(() => { win.close(); alert(t('export_fail')); });
}

// ── THEMES ──
const THEMES = {
  slate: { bg:'#f0f2f6', surface:'#ffffff', border:'#b8c4d4', text:'#1a2230', muted:'#6070a0', accent:'#4a6080', accentLight:'#dde4f0', headerBg:'#2d3f55', headerText:'#f0f4fa', amBorder:'#8090b0', weekend:'#e4e8f4' },
};

function applyTheme(name) {
  state.settings.theme = name;
  const t = THEMES[name] || THEMES.slate;
  const r = document.documentElement.style;
  r.setProperty('--bg', t.bg);
  r.setProperty('--surface', t.surface);
  r.setProperty('--border', t.border);
  r.setProperty('--text', t.text);
  r.setProperty('--text-muted', t.muted);
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent-light', t.accentLight);
  r.setProperty('--accent-blue', t.accent);
  r.setProperty('--accent-blue-light', t.accentLight);
  r.setProperty('--header-bg', t.headerBg);
  r.setProperty('--header-text', t.headerText);
  r.setProperty('--am-border', t.amBorder);
  r.setProperty('--cell-weekend', t.weekend);
  document.querySelectorAll('.theme-swatch').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === name);
  });
  saveState();
}

// ── 员工账号辅助（需在 INIT 前定义供 checkEmpSession 调用）──
// 从服务器获取账号，同时缓存到 localStorage 作为快速恢复用
async function fetchEmpAccounts() {
  try {
    const result = await Backend.getEmpAccounts();
    if (result && result.accounts) {
      localStorage.setItem('emp_accounts_v1', JSON.stringify(result.accounts));
      return result.accounts;
    }
  } catch(e) {}
  // fallback: 用本地缓存
  return getLocalEmpAccounts();
}
function getLocalEmpAccounts() {
  try {
    const s = localStorage.getItem('emp_accounts_v1');
    return s ? JSON.parse(s) : {};
  } catch(e) { return {}; }
}
async function sha256Emp(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

loadState();

// 语言切换回调：切换语言时重新渲染动态内容
function onLangChanged(lang) {
  // 重新生成语言切换按钮（更新高亮状态）
  initLangSwitchers();
  // 更新 nav title
  const name = state.settings.name;
  if (name && name !== '某某') {
    document.getElementById('nav-title').textContent = getLang() === 'en'
      ? `${name}'s Schedule` : name + '的班表';
  }
  renderCalendar();
  renderInlineSettings();
  if (document.getElementById('view-roster').classList.contains('active')) {
    renderRoster();
  }
}

// 初始化语言切换按钮（登录页 + 顶部导航各一个）
function initLangSwitchers() {
  const loginSw = document.getElementById('login-lang-switch');
  if (loginSw) loginSw.innerHTML = langSwitchHTML();
  const navSw = document.getElementById('nav-lang-switch');
  if (navSw) navSw.innerHTML = langSwitchHTML();
}

// 检查是否已登录（session 存在且账号仍有效）
(function checkEmpSession() {
  // 初始化语言切换按钮
  initLangSwitchers();
  applyI18n();

  const savedName = sessionStorage.getItem('emp_logged_in');
  if (savedName) {
    const accounts = getLocalEmpAccounts();
    if (accounts[savedName]) {
      // 恢复已登录状态
      state.settings.name = savedName;
      state.monthMode = getDefaultMonthMode();
      saveState();
      document.getElementById('emp-login-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      document.getElementById('nav-title').textContent = getLang() === 'en'
        ? `${savedName}'s Schedule` : savedName + '的班表';
      initCalendar();
      updateMonthModeTabs();
      renderCalendar();
      renderInlineSettings();
      setSlotMode('full');
      if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
        const tip = document.getElementById('ios-tip');
        if (tip) tip.style.display = 'block';
      }
      applyTheme('slate');
      return;
    }
  }
  // 未登录：显示登录页
  document.getElementById('emp-login-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
})();
</script>

if ('serviceWorker' in navigator) {

// ── 员工登录 ──────────────────────────────────────────────────────
async function doEmpLogin() {
  const nameVal = document.getElementById('emp-login-name').value.trim();
  const pwVal   = document.getElementById('emp-login-pw').value;
  const errEl   = document.getElementById('emp-login-error');
  const btn     = document.getElementById('emp-login-btn');
  errEl.textContent = '';
  if (!nameVal) { errEl.textContent = t('emp_login_enter_name'); return; }
  if (!pwVal)   { errEl.textContent = t('emp_login_enter_pw'); return; }

  btn.disabled = true; btn.textContent = t('emp_login_verifying');
  // 从服务器拉取最新账号数据（同时更新本地缓存）
  const accounts = await fetchEmpAccounts();
  const acct = accounts[nameVal];
  if (!acct) {
    errEl.textContent = t('emp_login_no_account');
    btn.disabled = false; btn.textContent = t('emp_login_btn');
    return;
  }
  const hash = await sha256Emp(pwVal);
  if (hash !== acct.passwordHash) {
    errEl.textContent = t('emp_login_wrong_pw');
    btn.disabled = false; btn.textContent = t('emp_login_btn');
    return;
  }
  // 登录成功
  sessionStorage.setItem('emp_logged_in', nameVal);
  state.settings.name = nameVal;
  state.monthMode = getDefaultMonthMode();
  saveState();
  document.getElementById('emp-login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('nav-title').textContent = getLang() === 'en'
    ? `${nameVal}'s Schedule` : nameVal + '的班表';
  initCalendar();
  updateMonthModeTabs();
  renderCalendar();
  renderInlineSettings();
  applyI18n();
  btn.disabled = false; btn.textContent = t('emp_login_btn');
}

function doEmpLogout() {
  sessionStorage.removeItem('emp_logged_in');
  state.monthMode = 'next';
  state.prevSubmissionCache = {};
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('emp-login-screen').style.display = 'flex';
  document.getElementById('emp-login-name').value = '';
  document.getElementById('emp-login-pw').value = '';
  document.getElementById('emp-login-error').textContent = '';
}

function openChangePwModal() {
  document.getElementById('cpw-old').value = '';
  document.getElementById('cpw-new').value = '';
  document.getElementById('cpw-new2').value = '';
  document.getElementById('cpw-error').textContent = '';
  document.getElementById('changepw-modal').classList.add('open');
}
function closeChangePwModal() {
  document.getElementById('changepw-modal').classList.remove('open');
}

async function doEmpChangePw() {
  const name = state.settings.name;
  const oldPw = document.getElementById('cpw-old').value;
  const newPw  = document.getElementById('cpw-new').value;
  const newPw2 = document.getElementById('cpw-new2').value;
  const errEl  = document.getElementById('cpw-error');
  errEl.textContent = '';

  if (!oldPw || !newPw || !newPw2) { errEl.textContent = t('cpw_fill_all'); return; }
  if (newPw.length < 4) { errEl.textContent = t('cpw_min4'); return; }
  if (newPw !== newPw2) { errEl.textContent = t('cpw_mismatch'); return; }

  const oldHash = await sha256Emp(oldPw);
  const newHash = await sha256Emp(newPw);

  // 先用本地缓存验证旧密码（快速反馈），再调服务器真正修改
  const localAccounts = getLocalEmpAccounts();
  const localAcct = localAccounts[name];
  if (localAcct && oldHash !== localAcct.passwordHash) {
    errEl.textContent = t('cpw_wrong_old');
    return;
  }

  try {
    const result = await Backend.changeEmpPassword(name, oldHash, newHash);
    if (!result.success) {
      errEl.textContent = result.error || t('unknown_error');
      return;
    }
    // 成功：更新本地缓存
    if (localAccounts[name]) localAccounts[name].passwordHash = newHash;
    localStorage.setItem('emp_accounts_v1', JSON.stringify(localAccounts));
    closeChangePwModal();
    alert(t('cpw_success'));
  } catch(e) {
    errEl.textContent = getLang() === 'en' ? 'Network error, please try again later' : '网络错误，请稍后再试';
  }
}
